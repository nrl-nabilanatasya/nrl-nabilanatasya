name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 0 */3 * *'   # every 3 days at 00:00 UTC
  workflow_dispatch:          # allows manual triggering

permissions:
  contents: write

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Pinging Supabase REST API..."
          response=$(curl -s -w "%{http_code}" -o /tmp/response.txt \
            -X GET "${SUPABASE_URL}/rest/v1/" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")

          echo "Status: $response"
          cat /tmp/response.txt

          if [ "$response" = "200" ]; then
            echo "Supabase ping successful"
          else
            echo "Ping failed with status: $response"
            exit 1
          fi

      - name: Keep workflow alive
        run: |
          # GitHub disables scheduled workflows after 60 days of repo inactivity
          # This dummy commit keeps the repo active
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          date > .last-ping
          git add .last-ping
          git diff --cached --quiet || git commit -m "keep-alive: $(date -u '+%Y-%m-%d')" && git push
